apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-analytics-output
  labels:
    app.kubernetes.io/name: spark-analytics
    app.kubernetes.io/part-of: nowchess
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-streaming-checkpoint
  labels:
    app.kubernetes.io/name: spark-analytics
    app.kubernetes.io/part-of: nowchess
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
