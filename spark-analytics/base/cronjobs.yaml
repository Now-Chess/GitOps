apiVersion: v1
kind: Service
metadata:
  name: spark-opening-book-driver
  labels:
    app.kubernetes.io/name: spark-analytics
    app.kubernetes.io/part-of: nowchess
spec:
  clusterIP: None
  selector:
    app: spark-opening-book
  ports:
    - name: driver
      port: 44167
      targetPort: 44167
    - name: blockmanager
      port: 44777
      targetPort: 44777
---
