apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  sources:
    - repoURL: git@git.janis-eccarius.de:NowChess/GitOps.git
      path: ./cert-manager/eu-central-1
      targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
