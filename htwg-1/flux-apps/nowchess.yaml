apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nowchess
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: gitops
    namespace: flux-system
  path: ./nowchess/htwg-1-prod
  prune: true
  targetNamespace: nowchess
  timeout: 5m
