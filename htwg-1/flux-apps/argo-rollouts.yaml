apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-rollouts
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: argo-rollouts
      version: "2.40.10"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
  values:
    installCRDs: true
    clusterInstall: true
    controller:
      replicas: 1
    dashboard:
      enabled: false
