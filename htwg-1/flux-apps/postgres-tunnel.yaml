apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-tunnel
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: gitops
    namespace: flux-system
  path: ./postgres-tunnel/htwg-1
  prune: true
  timeout: 3m
