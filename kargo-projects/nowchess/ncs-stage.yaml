kind: Stage
apiVersion: kargo.akuity.io/v1alpha1
metadata:
  name: staging
  namespace: nowchess-kargo
  annotations:
    kargo.akuity.io/color: fuchsia
spec:
  vars:
    - name: argocdName
      value: nowchess-staging
    - name: folder
      value: eu-central-1-staging
    - name: tagSuffix
      value: ""
  requestedFreight:
    - origin:
        kind: Warehouse
        name: analysis
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: account
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: bot-platform
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: coordinator
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: core
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: io
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: official-bots
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: rule
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: store
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: ws
      sources:
        direct: true
        requiredSoakTime: 5m0s
    - origin:
        kind: Warehouse
        name: frontend
      sources:
        direct: true
        requiredSoakTime: 5m0s
  verification:
    analysisTemplates:
      - name: nowchess-performance-tests
  promotionTemplate:
    spec:
      steps:
        - task:
            name: nowchess-kargo-promotion-template
---
