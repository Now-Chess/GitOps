apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nowchess-account
  labels:
    app: nowchess-account
spec:
  selector:
    matchLabels:
      app: nowchess-account
  template:
    metadata:
      labels:
        app: nowchess-account
      annotations:
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics_path: "/q/metrics"
        k8s.grafana.com/metrics_portNumber: "8083"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: nowchess-account
          image: ghcr.io/now-chess/now-chess-systems/account:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: nowchess-env-config
          env:
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: CORE_SERVICE_URL
              value: http://nowchess-core-active:8080
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: ncs-internal-secret
                  key: INTERNAL_SECRET
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ncs-db-secrets
                  key: ACCOUNT_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ncs-db-secrets
                  key: ACCOUNT_DB_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ncs-db-secrets
                  key: ACCOUNT_DB_URL
            - name: JWT_PUBLIC_KEY_PATH
              value: /secrets/jwt/public.pem
            - name: JWT_PRIVATE_KEY_PATH
              value: /secrets/jwt/private.pem
          volumeMounts:
            - name: jwt-keys
              mountPath: /secrets/jwt
              readOnly: true
          ports:
            - containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8083
            initialDelaySeconds: 0
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8083
            initialDelaySeconds: 0
            periodSeconds: 5
          resources:
            requests:
              cpu: "5m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: jwt-keys
          secret:
            secretName: ncs-jwt-keys
  rollbackWindow:
    revisions: 3
  strategy:
    blueGreen:
      activeService: nowchess-account-active
      previewService: nowchess-account-preview
      autoPromotionEnabled: true
      previewReplicaCount: 1
---
