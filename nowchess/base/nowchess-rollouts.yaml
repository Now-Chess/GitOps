              protocol: TCP
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
          resources:
            requests:
              cpu: "15m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: jwt-keys
          secret:
            secretName: ncs-jwt-keys
  rollbackWindow:
    revisions: 3
  strategy:
    blueGreen:
      activeService: nowchess-core-active
      previewService: nowchess-core-preview
      autoPromotionEnabled: true
      previewReplicaCount: 1
