architecture: standalone

auth:
  enabled: false

image:
  registry: docker.io
  repository: redis
  tag: "8.6.2-trixie"

master:
  podAnnotations:
    k8s.grafana.com/scrape: "true"
    k8s.grafana.com/metrics.portNumber: "9121"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  persistence:
    enabled: false

metrics:
  enabled: true
